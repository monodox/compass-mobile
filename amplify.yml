version: 1
frontend:
  phases:
    preBuild:
      commands:
        - wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.0-stable.tar.xz
        - tar xf flutter_linux_3.24.0-stable.tar.xz
        - export PATH="$PATH:`pwd`/flutter/bin"
        - flutter config --no-analytics
        - flutter --version
        - echo "SUPABASE_URL=$SUPABASE_URL" > .env.local
        - echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env.local
        - echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env.local
        - flutter pub get
    build:
      commands:
        - export PATH="$PATH:`pwd`/flutter/bin"
        - flutter build web --release --web-renderer canvaskit
  artifacts:
    baseDirectory: build/web
    files:
      - '**/*'
  cache:
    paths:
      - flutter/**/*
      - .pub-cache/**/*
